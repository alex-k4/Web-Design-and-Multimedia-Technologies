<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Forge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header>
    <div class="logo-container">
        <img src="images/logo.png" class="logo">
        <h1 class="bungee-regular">Game Forge</h1>
    </div>

    <nav>
        <ul>
            <li><a href="index.html" class="active">Начало</a></li>
            <li><a href="about.html">За нас</a></li>
            <li><a href="contacts.html">Контакти</a></li>
            <li><a href="bootstrap.html">Създайте игра</a></li>
            <li><a href="tailwind.html">Готови модели</a></li>
        </ul>
    </nav>

    <div class="cart-container">
        <button id="cart-button" class="cart-button">
            <img src="images/icon_basket.gif" class="cart-icon" alt="Cart">
            <span class="cart-text">Кошница</span>
            (<span id="cart-count">0</span>)
        </button>
    </div>
</header>

<!-- CART -->
<div id="cart-window" class="hidden">
    <h3>Кошница</h3>
    <div id="cart-items"></div>
    <button onclick="checkout()">Поръчай</button>
</div>

<!-- HERO -->
<section class="hero">
    <div class="hero-overlay">
        <h2>Създайте вашата уникална настолна игра</h2>
        <p>Създайте, променете, допълнете игра</p>
        <a href="bootstrap.html" class="btn">Започнете да създавате</a>
    </div>
</section>

<!-- SERVICES (fix: не е hero) -->
<section class="features">

    <img src="images/hero.jpg" alt="Hero" class="hero-img">

    <div class="hero-overlay">
        <h2>Нашите услуги</h2>

        <div class="hero-buttons">

            <a href="bootstrap.html" class="glass-btn">Създайте игра</a>
            <a href="tailwind.html" class="glass-btn">Готови модели</a>

        </div>
    </div>

</section>

<!-- AJAX OUTPUT (важно) -->
<div id="api-result"></div>

<footer>
    <p>&copy; 2026 Game Forge. All rights reserved.</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
