<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Разгледай модели - Game Forge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-gray-900 text-white font-sans">

<!-- HEADER -->
<header class="flex justify-between items-center p-5 bg-black/60 shadow-sm">

    <div class="flex items-center gap-3">
        <img src="images/logo.png" alt="Game Forge Logo" class="h-16">
        <h1 class="text-2xl font-bold">Game Forge</h1>
    </div>

    <nav>
        <ul class="flex gap-4">
            <li><a href="index.html" class="text-purple-400">Начало</a></li>
            <li><a href="about.html" class="text-purple-400">За нас</a></li>
            <li><a href="contacts.html" class="text-purple-400">Контакти</a></li>
        </ul>
    </nav>

    <!-- CART -->
    <button id="cart-button"
        class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
        🛒 Кошница (<span id="cart-count">0</span>)
    </button>

</header>

<!-- CART WINDOW -->
<div id="cart-window" class="hidden fixed top-20 right-5 w-80 bg-gray-800 p-4 rounded shadow-lg z-50">
    <h3 class="text-lg font-bold mb-3">Кошница</h3>

    <div id="cart-items" class="mb-3"></div>

    <button onclick="checkout()"
        class="bg-green-600 w-full py-1 rounded hover:bg-green-700">
        Поръчай
    </button>
</div>

<!-- MAIN -->
<main class="max-w-6xl mx-auto my-10 px-5">

    <h2 class="text-4xl text-center mb-6">Готови модели на настолни игри</h2>
    <p class="text-center mb-10">Разгледайте и добавете в кошницата</p>

    <div class="grid sm:grid-cols-1 md:grid-cols-3 gap-6">

        <!-- PRODUCT -->
        <div class="bg-gray-800 p-5 rounded shadow">
            <img src="images/game1.png" class="w-full h-48 object-cover rounded mb-3">
            <h3 class="font-bold text-xl">Класически карти</h3>
            <p>30 €</p>

            <input id="q1" type="number" value="1" min="1"
                class="text-black w-20 p-1 mt-2 mb-2">

            <button onclick="addToCart('Класически карти', 30, document.getElementById('q1').value)"
                class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

        <div class="bg-gray-800 p-5 rounded shadow">
            <img src="images/game2.png" class="w-full h-48 object-cover rounded mb-3">
            <h3 class="font-bold text-xl">Мистериозни</h3>
            <p>40 €</p>

            <input id="q2" type="number" value="1" min="1"
                class="text-black w-20 p-1 mt-2 mb-2">

            <button onclick="addToCart('Мистериозни', 40, document.getElementById('q2').value)"
                class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

        <div class="bg-gray-800 p-5 rounded shadow">
            <img src="images/game3.png" class="w-full h-48 object-cover rounded mb-3">
            <h3 class="font-bold text-xl">Персонализирани карти</h3>
            <p>45 €</p>

            <input id="q3" type="number" value="1" min="1"
                class="text-black w-20 p-1 mt-2 mb-2">

            <button onclick="addToCart('Персонализирани карти', 45, document.getElementById('q3').value)"
                class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

    </div>
</main>

<script src="js/script.js"></script>

</body>
</html>
