<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Разгледай модели - Game Forge (Tailwind)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800 font-sans">
    <header class="flex justify-between items-center p-5 shadow-sm">
        <div class="flex items-center gap-3">
            <img src="images/logo.png" alt="Game Forge Logo" class="h-20">
            <h1 class="text-3xl font-bold">Game Forge</h1>
        </div>
        <nav>
            <ul class="flex gap-4">
                <li><a href="index.html" class="text-purple-700 font-semibold">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto my-10 px-5">
        <h2 class="text-4xl text-center mb-6">Готови модели на настолни игри</h2>
        <p class="text-center mb-10">Разгледайте нашите предложения, които можете да персонализирате с Tailwind.</p>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-gray-100 p-5 rounded shadow hover:scale-105 transition">
                <h3 class="text-xl font-bold mb-2">Игра 1</h3>
                <p>Описание на игра 1</p>
            </div>
            <div class="bg-gray-100 p-5 rounded shadow hover:scale-105 transition">
                <h3 class="text-xl font-bold mb-2">Игра 2</h3>
                <p>Описание на игра 2</p>
            </div>
            <div class="bg-gray-100 p-5 rounded shadow hover:scale-105 transition">
                <h3 class="text-xl font-bold mb-2">Игра 3</h3>
                <p>Описание на игра 3</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-5 border-t">
        &copy; 2026 Game Forge
    </footer>
</body>
</html>
