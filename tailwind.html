<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Разгледай модели - Game Forge</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- YOUR CSS -->
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-gray-900 text-white font-sans">

<!-- HEADER -->
<header class="flex justify-between items-center p-5 shadow-sm bg-black/60">

    <div class="flex items-center gap-3">
        <img src="images/logo.png" alt="Game Forge Logo" class="h-20">
        <h1 class="text-3xl font-bold">Game Forge</h1>
    </div>

    <nav>
        <ul class="flex gap-4">
            <li><a href="index.html" class="text-purple-400 font-semibold">Home</a></li>
            <li><a href="about.html" class="text-purple-400">About</a></li>
            <li><a href="contacts.html" class="text-purple-400">Contacts</a></li>
        </ul>
    </nav>

    <div class="cart-container">
        <button id="cart-button" class="bg-purple-600 text-white px-3 py-1 rounded hover:bg-purple-700">
            Кошница 🛒 (<span id="cart-count">0</span>)
        </button>
    </div>

</header>

<!-- CART -->
<div id="cart-window" class="hidden">
    <h3 class="text-lg font-bold mb-3">Кошница</h3>
    <div id="cart-items" class="mb-3"></div>
    <button onclick="checkout()" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 w-full">
        Поръчай
    </button>
</div>

<!-- MAIN -->
<main class="max-w-6xl mx-auto my-10 px-5">

    <h2 class="text-4xl text-center mb-6">
        Готови модели на настолни игри
    </h2>

    <p class="text-center mb-10">
        Разгледайте нашите предложения и ги персонализирайте
    </p>

    <div class="grid sm:grid-cols-1 md:grid-cols-3 gap-6">

        <!-- GAME 1 -->
        <div class="bg-gray-800 p-5 rounded shadow hover:scale-105 transition">
            <img src="images/game1.png" class="w-full h-48 object-cover mb-3 rounded">
            <h3 class="text-xl font-bold">Класически карти</h3>
            <p>Цена: 30 €</p>

            <input id="quantity1" type="number" min="1" value="1"
                   class="border p-1 w-20 mb-2 text-black">

            <button onclick="addToCart('Класически карти', 30, document.getElementById('quantity1').value)"
                    class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

        <!-- GAME 2 -->
        <div class="bg-gray-800 p-5 rounded shadow hover:scale-105 transition">
            <img src="images/game2.png" class="w-full h-48 object-cover mb-3 rounded">
            <h3 class="text-xl font-bold">Мистериозни</h3>
            <p>Цена: 40 €</p>

            <input id="quantity2" type="number" min="1" value="1"
                   class="border p-1 w-20 mb-2 text-black">

            <button onclick="addToCart('Мистериозни', 40, document.getElementById('quantity2').value)"
                    class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

        <!-- GAME 3 -->
        <div class="bg-gray-800 p-5 rounded shadow hover:scale-105 transition">
            <img src="images/game3.png" class="w-full h-48 object-cover mb-3 rounded">
            <h3 class="text-xl font-bold">Персонализирани карти</h3>

            <!-- FIXED PRICE -->
            <p>Цена: 45 €</p>

            <input id="quantity3" type="number" min="1" value="1"
                   class="border p-1 w-20 mb-2 text-black">

            <button onclick="addToCart('Персонализирани карти', 45, document.getElementById('quantity3').value)"
                    class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

        <!-- GAME 4 -->
        <div class="bg-gray-800 p-5 rounded shadow hover:scale-105 transition">
            <img src="images/game4.png" class="w-full h-48 object-cover mb-3 rounded">
            <h3 class="text-xl font-bold">Тип карта</h3>
            <p>Цена: 50 €</p>

            <input id="quantity4" type="number" min="1" value="1"
                   class="border p-1 w-20 mb-2 text-black">

            <button onclick="addToCart('Тип карта', 50, document.getElementById('quantity4').value)"
                    class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

        <!-- GAME 5 -->
        <div class="bg-gray-800 p-5 rounded shadow hover:scale-105 transition">
            <img src="images/game5.png" class="w-full h-48 object-cover mb-3 rounded">
            <h3 class="text-xl font-bold">Образователни</h3>
            <p>Цена: 15 €</p>

            <input id="quantity5" type="number" min="1" value="1"
                   class="border p-1 w-20 mb-2 text-black">

            <button onclick="addToCart('Образователни', 15, document.getElementById('quantity5').value)"
                    class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

        <!-- GAME 6 -->
        <div class="bg-gray-800 p-5 rounded shadow hover:scale-105 transition">
            <img src="images/game6.png" class="w-full h-48 object-cover mb-3 rounded">
            <h3 class="text-xl font-bold">Домино</h3>
            <p>Цена: 20 €</p>

            <input id="quantity6" type="number" min="1" value="1"
                   class="border p-1 w-20 mb-2 text-black">

            <button onclick="addToCart('Домино', 20, document.getElementById('quantity6').value)"
                    class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
                Добави
            </button>
        </div>

    </div>
</main>

<!-- SCRIPT FIX -->
<script src="js/script.js"></script>

<script>
function openChat(gameName) {
    alert(`Чат за персонализация: ${gameName}`);
}
</script>

</body>
</html>
