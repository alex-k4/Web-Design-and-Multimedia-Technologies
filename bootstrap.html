<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Създай игра - Game Forge (Bootstrap)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="d-flex justify-content-between align-items-center p-3 bg-white shadow-sm">
        <div class="logo-container d-flex align-items-center">
            <img src="images/logo.png" alt="Game Forge Logo" class="logo me-2">
            <h1 class="bungee-regular m-0">Game Forge</h1>
        </div>
        <nav>
            <ul class="nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="container my-5">
        <h2 class="text-center mb-4">Създай своя персонализирана настолна игра</h2>
        <p class="text-center">Тук можеш да избереш стил, тема и компоненти за твоята игра с Bootstrap UI.</p>

        <form class="row g-3 mt-5">
            <div class="col-md-6">
                <label class="form-label">Име на играта</label>
                <input type="text" class="form-control" placeholder="Въведи име">
            </div>
            <div class="col-md-6">
                <label class="form-label">Брой играчи</label>
                <input type="number" class="form-control" placeholder="1-6">
            </div>
            <div class="col-12">
                <label class="form-label">Описание на играта</label>
                <textarea class="form-control" rows="3"></textarea>
            </div>
            <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary">Създай игра</button>
            </div>
        </form>
    </main>

    <footer class="text-center py-3 border-top">
        &copy; 2026 Game Forge
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
